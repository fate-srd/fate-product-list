name: Check CSV order

on: pull_request


jobs:
  check-order:
    runs-on: [ubuntu-latest]

    steps:

      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup nodejs
        uses: actions/setup-node@v5
        with:
          node-version: '24.x'
      - run: npm ci
      - name: Check ordering
        run: npm test